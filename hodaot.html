<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הודעות — אדרת אליהו</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body { padding-top: 80px; }
    .hodaot-list {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      margin-top: 2.5rem;
    }
    .hodaa-card { position: relative; }
    .hodaa-card.pinned { border-color: var(--gold); background: rgba(201,168,76,0.06); }
    .pin-badge  { font-size: 0.75rem; color: var(--gold); margin-bottom: 0.5rem; display: block; }
    .hodaa-date  { font-size: 0.82rem; color: var(--muted); margin-bottom: 0.4rem; }
    .hodaa-title { font-size: 1.25rem; color: var(--gold-light); margin-bottom: 0.75rem; }
    .hodaa-body  { font-size: 0.97rem; line-height: 1.8; }
    .empty-state { text-align: center; color: var(--muted); padding: 4rem; font-size: 1.1rem; }
    #loadMoreBtn {
      display: none;
      margin: 2rem auto 0;
    }
  </style>
</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <a href="index.html" class="navbar-brand">
    <img src="images/logo.jpg" alt="לוגו" class="navbar-logo">
    <span class="navbar-name">אדרת אליהו</span>
  </a>
  <div class="navbar-links">
    <a href="index.html">ראשי</a>
    <a href="zmanim.html">זמני תפילות</a>
    <a href="hodaot.html" class="active">הודעות</a>
    <a href="tashlumim.html">תשלומים</a>
    <a href="galeria.html">גלריה</a>
    <a href="yetzirat-kesher.html">יצירת קשר</a>
  </div>
  <div class="navbar-actions" id="navUserSection">
    <button class="btn-login" id="navLoginBtn" onclick="location.href='cheshbon.html'">כניסה</button>
    <button class="btn-login" id="navLogoutBtn" style="display:none">יציאה</button>
  </div>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>
<div class="nav-overlay" id="navOverlay"></div>
<nav class="mobile-nav" id="mobileNav">
  <a href="index.html">🏛 ראשי</a>
  <a href="zmanim.html">🕍 זמני תפילות</a>
  <a href="hodaot.html">📢 הודעות</a>
  <a href="tashlumim.html">💳 תשלומים</a>
  <a href="cheshbon.html">👤 החשבון שלי</a>
  <a href="galeria.html">🖼 גלריה</a>
  <a href="yetzirat-kesher.html">📞 יצירת קשר</a>
</nav>

<div class="page-hero">
  <h1>הודעות</h1>
  <p>עדכונים ממשרד הרב והגבאות</p>
</div>

<main class="section">
  <div class="container" style="max-width:780px">
    <div class="divider">
      <svg viewBox="0 0 24 24" width="22" height="22"><polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="currentColor"/></svg>
    </div>
    <div class="hodaot-list" id="hodaotList">
      <div class="skeleton card" style="height:140px"></div>
      <div class="skeleton card" style="height:140px"></div>
      <div class="skeleton card" style="height:140px"></div>
    </div>
    <div style="text-align:center">
      <button id="loadMoreBtn" class="btn btn-outline">טען עוד הודעות</button>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom"><p>© 2025 בית כנסת אדרת אליהו</p></div>
  </div>
</footer>

<script type="module">
  import { loadHodaot } from './js/hodaot.js';
  import './js/nav.js';
  loadHodaot({ containerId: 'hodaotList', loadMoreBtnId: 'loadMoreBtn' });
</script>
</body>
</html>
