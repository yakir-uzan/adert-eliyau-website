<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>ממשק ניהול — אדרת אליהו</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body { padding-top: 0; background: #0a1420; }

    /* ── Login ── */
    #loginSection {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: var(--navy-mid);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius-lg);
      padding: 3rem 2.5rem;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-box h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
    .login-box p  { color: var(--muted); font-size: 0.9rem; margin-bottom: 2rem; }
    .admin-input {
      width: 100%;
      background: var(--navy);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius);
      padding: 0.85rem 1rem;
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 1rem;
      margin-bottom: 1rem;
      direction: ltr;
      text-align: right;
    }
    .admin-input:focus { outline: none; border-color: var(--gold); }
    #loginError { color: #f87171; font-size: 0.9rem; margin-top: -0.5rem; margin-bottom: 0.75rem; min-height: 1.2em; }

    /* ── Admin layout ── */
    #adminPanel { display: none; min-height: 100vh; }
    .admin-topbar {
      background: #060d15;
      border-bottom: 1px solid var(--gold-dim);
      padding: 0.85rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
    }
    .admin-topbar-brand { font-family: var(--font-display); color: var(--gold); font-size: 1.1rem; }
    .admin-meta { color: var(--muted); font-size: 0.85rem; display: flex; align-items: center; gap: 1rem; }
    #adminEmail { color: var(--gold-light); }

    .admin-body {
      display: grid;
      grid-template-columns: 220px 1fr;
      min-height: calc(100vh - 56px);
    }
    .admin-sidebar {
      background: #080f18;
      border-inline-start: 1px solid var(--gold-dim);
      padding: 1.5rem 0;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.85rem 1.5rem;
      color: var(--muted);
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      border: none;
      background: none;
      text-align: right;
      width: 100%;
    }
    .sidebar-link:hover, .sidebar-link.active {
      color: var(--gold);
      background: var(--gold-dim);
    }
    .admin-content { padding: 2rem; overflow-y: auto; }

    /* ── Panels ── */
    .admin-panel { display: none; }
    .admin-panel.active { display: block; }
    .admin-panel h2 {
      font-size: 1.4rem;
      margin-bottom: 1.5rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--gold-dim);
    }
    .admin-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem 2rem;
    }
    .admin-form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .admin-form-group label { font-size: 0.85rem; color: var(--gold-light); font-weight: 600; }
    .admin-form-group input,
    .admin-form-group select,
    .admin-form-group textarea {
      background: var(--navy);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius);
      padding: 0.7rem 0.9rem;
      color: var(--cream);
      font-family: var(--font-body);
      font-size: 0.95rem;
      direction: rtl;
      width: 100%;
      transition: var(--transition);
    }
    .admin-form-group input:focus,
    .admin-form-group select:focus,
    .admin-form-group textarea:focus { outline: none; border-color: var(--gold); }
    .admin-form-group input[type="time"] { direction: ltr; text-align: center; font-size: 1.1rem; }
    .admin-form-group select option { background: var(--navy-mid); }
    .admin-form-group textarea { resize: vertical; min-height: 100px; }
    .admin-form-footer { margin-top: 1.5rem; display: flex; gap: 1rem; align-items: center; }

    .admin-section-box {
      background: var(--navy-mid);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      margin-bottom: 2rem;
    }
    .admin-section-box h3 {
      font-size: 1.1rem;
      color: var(--gold);
      margin-bottom: 1.25rem;
      padding-bottom: 0.6rem;
      border-bottom: 1px solid var(--gold-dim);
    }

    /* Hodaot list */
    .admin-hodaa-item {
      background: var(--navy);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 0.75rem;
    }
    .admin-hodaa-header { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }
    .admin-item-actions { display: flex; gap: 0.5rem; margin-top: 0.75rem; flex-wrap: wrap; }
    .badge-pinned { color: var(--gold); }

    /* Charges */
    .user-charges-block {
      background: var(--navy);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .user-charges-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
      padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--gold-dim);
    }
    .user-charges-header strong { color: var(--gold-light); font-size: 1rem; }
    .total-debt-badge {
      background: rgba(248,113,113,0.15);
      color: #f87171;
      padding: 0.2rem 0.75rem;
      border-radius: 20px;
      font-size: 0.85rem;
      font-weight: 700;
    }
    .charge-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(201,168,76,0.06);
      flex-wrap: wrap;
    }
    .charge-row:last-child { border: none; }
    .charge-row span { font-size: 0.92rem; }
    .charge-type-badge {
      display: inline-block;
      padding: 0.15rem 0.55rem;
      border-radius: 4px;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
    }
    .type-aliya { background: rgba(201,168,76,0.15); color: var(--gold); }
    .type-neder { background: rgba(139,26,26,0.2);   color: #f87171; }

    /* Buttons */
    .btn-sm {
      padding: 0.35rem 0.85rem;
      border-radius: var(--radius);
      font-size: 0.82rem;
      font-weight: 700;
      border: none;
      cursor: pointer;
      transition: var(--transition);
      font-family: var(--font-body);
    }
    .btn-danger  { background: rgba(139,26,26,0.3); color: #f87171; border: 1px solid rgba(139,26,26,0.4); }
    .btn-danger:hover { background: rgba(139,26,26,0.5); }
    .btn-success { background: rgba(26,122,58,0.3); color: #4ade80; border: 1px solid rgba(26,122,58,0.4); }
    .btn-success:hover { background: rgba(26,122,58,0.5); }
    .btn-sm.btn-outline { background: transparent; border: 1px solid var(--gold-dim); color: var(--muted); }
    .btn-sm.btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 2rem; left: 50%;
      transform: translateX(-50%);
      padding: 0.9rem 2rem;
      border-radius: var(--radius);
      font-weight: 700;
      z-index: 9999;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }
    #toast.show { opacity: 1; }

    @media (max-width: 768px) {
      .admin-body { grid-template-columns: 1fr; }
      .admin-sidebar { flex-direction: row; overflow-x: auto; border: none; border-bottom: 1px solid var(--gold-dim); padding: 0.5rem; }
      .sidebar-link { padding: 0.6rem 1rem; white-space: nowrap; }
      .admin-form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div id="toast"></div>

<!-- ── LOGIN ── -->
<div id="loginSection">
  <div class="login-box">
    <div style="font-size:2.5rem;margin-bottom:0.75rem">🔐</div>
    <h1>כניסה לניהול</h1>
    <p>בית כנסת אדרת אליהו — גבאות</p>
    <form id="loginForm">
      <input type="email" id="loginEmail" class="admin-input" placeholder="אימייל" required dir="ltr">
      <input type="password" id="loginPass" class="admin-input" placeholder="סיסמה" required dir="ltr">
      <div id="loginError"></div>
      <button type="submit" class="btn btn-gold" style="width:100%;font-size:1rem">כניסה</button>
    </form>
  </div>
</div>

<!-- ── ADMIN PANEL ── -->
<div id="adminPanel">

  <div class="admin-topbar">
    <span class="admin-topbar-brand">⚙️ ממשק ניהול — אדרת אליהו</span>
    <div class="admin-meta">
      <span id="adminEmail"></span>
      <button id="logoutBtn" class="btn-sm btn-outline" style="border-color:var(--gold-dim)">יציאה</button>
    </div>
  </div>

  <div class="admin-body">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <button class="sidebar-link active" onclick="showPanel('zmanim', this)">🕍 זמני תפילות</button>
      <button class="sidebar-link" onclick="showPanel('hodaot', this)">📢 הודעות</button>
      <button class="sidebar-link" onclick="showPanel('charges', this)">💳 חיובי מתפללים</button>
    </aside>

    <!-- Content -->
    <main class="admin-content">

      <!-- ZMANIM PANEL -->
      <div class="admin-panel active" id="panel-zmanim">
        <h2>🕍 עדכון זמני תפילות</h2>
        <form id="zmanimForm">
          <div class="admin-section-box">
            <h3>ימי חול</h3>
            <div class="admin-form-grid">
              <div class="admin-form-group">
                <label for="z_shacharit_weekday">שחרית (חול)</label>
                <input type="time" id="z_shacharit_weekday" name="shacharit_weekday">
              </div>
              <div class="admin-form-group">
                <label for="z_mincha_summer">מנחה (קיץ)</label>
                <input type="time" id="z_mincha_summer" name="mincha_summer">
              </div>
              <div class="admin-form-group">
                <label for="z_mincha_winter">מנחה (חורף)</label>
                <input type="time" id="z_mincha_winter" name="mincha_winter">
              </div>
              <div class="admin-form-group">
                <label for="z_arvit">ערבית</label>
                <input type="time" id="z_arvit" name="arvit">
              </div>
            </div>
          </div>
          <div class="admin-section-box">
            <h3>שבת קודש</h3>
            <div class="admin-form-grid">
              <div class="admin-form-group">
                <label for="z_kabbalat_shabbat">קבלת שבת</label>
                <input type="time" id="z_kabbalat_shabbat" name="kabbalat_shabbat">
              </div>
              <div class="admin-form-group">
                <label for="z_shacharit_shabbat">שחרית (שבת)</label>
                <input type="time" id="z_shacharit_shabbat" name="shacharit_shabbat">
              </div>
            </div>
          </div>
          <div class="admin-section-box">
            <h3>הערה כללית (אופציונלי)</h3>
            <div class="admin-form-group">
              <textarea id="z_note" placeholder='לדוגמה: "זמני החורף בתוקף מא׳ מרחשוון"'></textarea>
            </div>
          </div>
          <div class="admin-form-footer">
            <button type="submit" class="btn btn-gold" style="font-size:1.05rem;padding:0.8rem 2.5rem">
              💾 שמור זמנים
            </button>
          </div>
        </form>
      </div>

      <!-- HODAOT PANEL -->
      <div class="admin-panel" id="panel-hodaot">
        <h2>📢 ניהול הודעות</h2>
        <div class="admin-section-box">
          <h3>הוספת הודעה חדשה</h3>
          <form id="hodaaForm">
            <div class="admin-form-group" style="margin-bottom:1rem">
              <label for="h_title">כותרת *</label>
              <input type="text" id="h_title" placeholder="לדוגמה: שבת פרשת בהר — הודעות שבת" required>
            </div>
            <div class="admin-form-group" style="margin-bottom:1rem">
              <label for="h_body">תוכן ההודעה *</label>
              <textarea id="h_body" rows="5" placeholder="כתוב את ההודעה כאן..." required></textarea>
            </div>
            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem">
              <input type="checkbox" id="h_pinned" style="width:20px;height:20px;accent-color:var(--gold)">
              <label for="h_pinned" style="color:var(--cream);font-size:1rem;cursor:pointer">📌 הצמד הודעה לראש הרשימה</label>
            </div>
            <button type="submit" class="btn btn-gold">+ פרסם הודעה</button>
          </form>
        </div>
        <div class="admin-section-box">
          <h3>הודעות פעילות</h3>
          <div id="hodaotAdminList"><p style="color:var(--muted)">טוען...</p></div>
        </div>
      </div>

      <!-- CHARGES PANEL -->
      <div class="admin-panel" id="panel-charges">
        <h2>💳 חיובי מתפללים</h2>
        <div class="admin-section-box">
          <h3>הוספת חיוב חדש</h3>
          <form id="chargeForm">
            <div class="admin-form-grid">
              <div class="admin-form-group">
                <label for="chargeUid">מתפלל *</label>
                <select id="chargeUid" required>
                  <option value="">-- בחר מתפלל --</option>
                </select>
              </div>
              <div class="admin-form-group">
                <label for="chargeType">סוג חיוב *</label>
                <select id="chargeType" required>
                  <option value="">-- בחר סוג --</option>
                  <option value="aliya">עלייה לתורה</option>
                  <option value="neder">נדר / תרומה</option>
                </select>
              </div>
              <div class="admin-form-group">
                <label for="chargeDesc">תיאור</label>
                <input type="text" id="chargeDesc" placeholder='לדוגמה: "ראשון, שבת פרשת בהר"'>
              </div>
              <div class="admin-form-group">
                <label for="chargeAmount">סכום (₪) *</label>
                <input type="number" id="chargeAmount" min="1" placeholder="0" dir="ltr" required>
              </div>
              <div class="admin-form-group">
                <label for="chargeDate">תאריך</label>
                <input type="date" id="chargeDate" dir="ltr">
              </div>
            </div>
            <div class="admin-form-footer">
              <button type="submit" class="btn btn-gold">+ הוסף חיוב</button>
            </div>
          </form>
        </div>
        <div class="admin-section-box">
          <h3>חיובים פתוחים לפי מתפלל</h3>
          <div id="chargesList"><p style="color:var(--muted)">טוען...</p></div>
        </div>
      </div>

    </main>
  </div>
</div>

<script>
  function showPanel(name, btn) {
    document.querySelectorAll('.admin-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.sidebar-link').forEach(b => b.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    btn.classList.add('active');
  }
</script>
<script type="module">import './js/admin.js';</script>
</body>
</html>
