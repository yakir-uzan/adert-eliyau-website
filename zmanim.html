<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>זמני תפילות — אדרת אליהו</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <style>
    body { padding-top: 80px; }
    .zmanim-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-top: 3rem;
    }
    .zmanim-block {
      background: var(--navy-mid);
      border: 1px solid var(--gold-dim);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }
    .zmanim-block h3 {
      text-align: center;
      font-size: 1.4rem;
      color: var(--gold);
      margin-bottom: 1.5rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--gold-dim);
    }
    .zman-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.9rem 0;
      border-bottom: 1px solid rgba(201,168,76,0.08);
    }
    .zman-row:last-child { border: none; }
    .zman-name { color: var(--cream); font-size: 1.05rem; }
    .zman-time { color: var(--gold); font-size: 1.5rem; font-weight: 700; direction: ltr; }
    .zmanim-note {
      text-align: center;
      color: var(--muted);
      margin-top: 1.5rem;
      font-size: 0.95rem;
    }
    .zmanim-updated {
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
      margin-top: 0.5rem;
    }
    @media (max-width: 640px) {
      .zmanim-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="navbar scrolled" id="navbar">
  <a href="index.html" class="navbar-brand">
    <img src="images/logo.jpg" alt="לוגו" class="navbar-logo">
    <span class="navbar-name">אדרת אליהו</span>
  </a>
  <div class="navbar-links">
    <a href="index.html">ראשי</a>
    <a href="zmanim.html" class="active">זמני תפילות</a>
    <a href="hodaot.html">הודעות</a>
    <a href="tashlumim.html">תשלומים</a>
    <a href="galeria.html">גלריה</a>
    <a href="yetzirat-kesher.html">יצירת קשר</a>
  </div>
  <div class="navbar-actions" id="navUserSection">
    <button class="btn-login" id="navLoginBtn" onclick="location.href='cheshbon.html'">כניסה</button>
    <button class="btn-login" id="navLogoutBtn" style="display:none">יציאה</button>
  </div>
  <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
</nav>
<div class="nav-overlay" id="navOverlay"></div>
<nav class="mobile-nav" id="mobileNav">
  <a href="index.html">🏛 ראשי</a>
  <a href="zmanim.html">🕍 זמני תפילות</a>
  <a href="hodaot.html">📢 הודעות</a>
  <a href="tashlumim.html">💳 תשלומים</a>
  <a href="cheshbon.html">👤 החשבון שלי</a>
  <a href="galeria.html">🖼 גלריה</a>
  <a href="yetzirat-kesher.html">📞 יצירת קשר</a>
</nav>

<div class="page-hero">
  <h1>זמני תפילות</h1>
  <p>עדכון אחרון ישיר ממשרד הגבאות</p>
</div>

<main class="section">
  <div class="container">
    <div class="divider">
      <svg viewBox="0 0 24 24" width="22" height="22"><polygon points="12,2 15,9 22,9 16,14 18,21 12,17 6,21 8,14 2,9 9,9" fill="currentColor"/></svg>
    </div>

    <div id="zmanimContainer">
      <div class="zmanim-grid">
        <div class="zmanim-block skeleton" style="height:320px"></div>
        <div class="zmanim-block skeleton" style="height:320px"></div>
      </div>
    </div>
  </div>
</main>

<footer class="footer">
  <div class="container">
    <div class="footer-bottom">
      <p>© 2025 בית כנסת אדרת אליהו</p>
    </div>
  </div>
</footer>

<script type="module">
  import { loadZmanim, renderZmanimFull } from './js/zmanim.js';
  import './js/nav.js';
  loadZmanim().then(data => {
    const c = document.getElementById('zmanimContainer');
    if (data) renderZmanimFull(data, c);
    else c.innerHTML = '<p class="empty-state">זמני תפילות יתעדכנו בקרוב</p>';
  });
</script>
</body>
</html>
